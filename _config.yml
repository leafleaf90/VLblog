# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Viktor Lövgren
author: Viktor Lövgren
# Used when a page has no featured-image (homepage, quotes, etc.)
# 1200×630 WebP (letterboxed) so Facebook/Slack/Twitter do not crop a square portrait
default_social_image: /assets/images/og-default.webp
default_social_image_width: 1200
default_social_image_height: 630
email: mail@viktorlovgren.com
# Hero (`home.html`) + default meta when a page omits `description` (keep in sync)
tagline: >-
  I use technology to supercharge solutions for environmental sustainability
  and mental well-being.
description: >-
  I use technology to supercharge solutions for environmental sustainability
  and mental well-being.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.viktorlovgren.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: viktorlovgren
# github_username:
port: 9999

# Quotes Configuration
# Google Docs integration for quotes - using your published document
quotes_google_docs_url: "https://docs.google.com/document/d/e/2PACX-1vQQV8LAuvIYb1LOmPp8pe6cSJ83LKJ3wfq91lXDvR2oFnffzelX76yFm5S9Dr06Z5GNblIcft8dq_U4/pub"
# Verbose per-element parse logs (default off). Or: GOOGLE_DOCS_QUOTES_VERBOSE=1 bundle exec jekyll build
google_docs_quotes_verbose: false

# Google Docs Posts Configuration
# See GOOGLE_DOCS_POSTS_SETUP.md for credential setup.
google_docs_posts_enabled: true
google_docs_posts_folder_id: "1hPZx27UyCHyvV-S1K74uoPQCcuYmVAOS"
google_docs_posts_service_account_json: "google-service-account.json"
google_docs_posts_cache_path: "_data/google_docs_posts_cache.json"
google_docs_posts_output_dir: "_posts"

# After Google Docs import: if a post has https featured-image / featured-thumbnail,
# download, write WebP under assets/post-media/<slug>/, patch _posts (needs Node + sharp).
remote_banner_sync_enabled: true
# Only fetch from these hostnames (recommended on CI). If unset, any https URL is allowed.
remote_banner_sync_allowed_hosts:
  - images.unsplash.com

# Build settings
theme: minima
plugins:
  - jekyll-feed

sass:
  quiet_deps: true

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

collections:
  posts:
    output: true
    permalink: /blog/:title/

include: [_redirects]
